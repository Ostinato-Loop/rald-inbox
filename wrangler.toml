name = "rald-inbox"
main = "src/index.ts"
compatibility_date = "2025-06-02"

[vars]
ENVIRONMENT = "development"
SERVICE_NAME = "rald-inbox"
SERVICE_VERSION = "1.0.0"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "placeholder-replace-with-actual-kv-id"

[triggers]
crons = ["*/10 * * * *"]

[observability]
enabled = true
head_sampling_rate = 1

# Secrets — set via: wrangler secret put <NAME>
# Required:
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   RALD_JWT_SECRET
# Optional:
#   NOTIFICATION_SERVICE_URL    — defaults to https://notification.rald.cloud
#   SEARCH_SERVICE_URL          — defaults to https://search.rald.cloud

[env.production]
name = "rald-inbox"
vars = { ENVIRONMENT = "production" }

[[env.production.routes]]
pattern = "inbox.rald.cloud/*"
zone_name = "rald.cloud"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_PRODUCTION_KV_ID"
