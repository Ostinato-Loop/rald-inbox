name = "rald-inbox"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[vars]
ENVIRONMENT = "production"
SERVICE_NAME = "rald-inbox"
SERVICE_VERSION = "1.0.0"
SUPABASE_URL = "https://onxdcikfttdmnhofsuwo.supabase.co"
NOTIFICATION_SERVICE_URL = "https://notification.rald.cloud"
SEARCH_SERVICE_URL = "https://search.rald.cloud"

[[routes]]
pattern = "inbox.rald.cloud/*"
zone_name = "rald.cloud"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "be8b3854b50c4f9aac8d91345e955466"

[observability]
enabled = true
head_sampling_rate = 1

# Cron trigger disabled — register manually via Cloudflare dashboard if needed:
# Scheduled Functions > rald-inbox > Add Cron Trigger > */10 * * * *

# Secrets pushed by deploy.yml via wrangler secret put:
#   SUPABASE_SERVICE_ROLE_KEY (org), RALD_JWT_SECRET
