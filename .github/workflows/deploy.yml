name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-rald-inbox
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Workers (inbox.rald.cloud)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Resolve KV namespace IDs via Cloudflare API
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          node << 'JSEOF'
          const fs = require('fs');
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token     = process.env.CLOUDFLARE_API_TOKEN;
          const headers   = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
          const base      = `https://api.cloudflare.com/client/v4/accounts/${accountId}/storage/kv/namespaces`;

          async function listAll() {
            const r = await fetch(`${base}?per_page=100`, { headers });
            const d = await r.json();
            if (!d.success) throw new Error('List KV failed: ' + JSON.stringify(d.errors));
            return d.result;
          }

          async function resolveId(title) {
            const all = await listAll();
            const existing = all.find(n => n.title === title);
            if (existing) { console.log(`  [existing] ${title} => ${existing.id.slice(0,8)}...`); return existing.id; }
            const r = await fetch(base, { method: 'POST', headers, body: JSON.stringify({ title }) });
            const d = await r.json();
            if (!d.success) {
              const retry = (await listAll()).find(n => n.title === title);
              if (retry) return retry.id;
              throw new Error('Create KV failed: ' + JSON.stringify(d.errors));
            }
            console.log(`  [created]  ${title} => ${d.result.id.slice(0,8)}...`);
            return d.result.id;
          }

          (async () => {
            const RATE_LIMIT_KV = await resolveId('rald-inbox-rate-limit');
            let toml = fs.readFileSync('wrangler.toml', 'utf8');
            toml = toml.replace('REPLACE_WITH_RATE_LIMIT_KV_KV_ID', RATE_LIMIT_KV);
            fs.writeFileSync('wrangler.toml', toml);
            console.log('wrangler.toml patched with real KV IDs.');
          })().catch(e => { console.error(e); process.exit(1); });
          JSEOF

      - name: Deploy rald-inbox Worker
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Push SUPABASE_SERVICE_ROLE_KEY to worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "FATAL: SUPABASE_SERVICE_ROLE_KEY not set in GitHub secrets"
            exit 1
          else
            echo "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --name rald-inbox
            echo "SUPABASE_SERVICE_ROLE_KEY pushed"
          fi
      - name: Push RALD_JWT_SECRET to worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RALD_JWT_SECRET: ${{ secrets.RALD_JWT_SECRET }}
        run: |
          if [ -z "$RALD_JWT_SECRET" ]; then
            echo "FATAL: RALD_JWT_SECRET not set in GitHub secrets"
            exit 1
          else
            echo "$RALD_JWT_SECRET" | npx wrangler secret put RALD_JWT_SECRET --name rald-inbox
            echo "RALD_JWT_SECRET pushed"
          fi
